<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclairs Origin Warn List</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <div class="max-w-7xl mx-auto p-6">
        <header class="mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Eclairs Origin Warn List</h1>
                <p class="text-slate-500 text-sm mt-0.5">upload csv file yang didownlaod dari chronogenesis (gambar disket / save)</p>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="download-capture" class="hidden bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2.5 rounded-xl transition text-sm shadow-sm cursor-pointer">
                    📸 Simpan List Sebagai Tabel
                </button>

                <div class="relative flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-xl transition cursor-pointer text-sm shadow-sm">
                    <input type="file" id="csv-file" accept=".csv, text/*, text/plain, application/vnd.ms-excel" class="absolute inset-0 opacity-0 cursor-pointer" />
                    <span>Upload CSV Chronogenesis</span>
                </div>
            </div>
        </header>

        <div id="status-bar" class="hidden mb-6 bg-slate-100 border border-slate-200 text-slate-600 text-sm px-4 py-2.5 rounded-xl font-medium">
        </div>

        <div id="dashboard-lists" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="bg-white rounded-2xl border border-rose-200 shadow-sm overflow-hidden">
                <div class="bg-rose-50 border-b border-rose-100 px-6 py-4 flex justify-between items-center">
                    <h2 class="font-bold text-rose-800 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-rose-500"></span> Warn List
                    </h2>
                    <span id="warning-badge" class="bg-rose-100 text-rose-700 text-xs font-bold px-2.5 py-1 rounded-md">0 Users</span>
                </div>
                <div class="p-4 overflow-y-auto max-h-[600px] divide-y divide-slate-100" id="warning-container">
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-slate-300 shadow-sm overflow-hidden">
                <div class="bg-slate-100 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                    <h2 class="font-bold text-slate-700 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-slate-400"></span> Gray List
                    </h2>
                    <span id="gray-badge" class="bg-slate-200 text-slate-700 text-xs font-bold px-2.5 py-1 rounded-md">0 Users</span>
                </div>
                <div class="p-4 overflow-y-auto max-h-[600px] divide-y divide-slate-100" id="gray-container">
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
